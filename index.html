<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rock, paper, scissor</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>


<div class="header">
  <p>Rock · Paper · Scissors</p>
</div>

<div class="pointers">
  <div class="content">
    <div class="you">
      <p class="name">YOU</p>
      <p class="you-pt"></p>
    </div>

    <div class="pc">
      <p class="name">COMPUTER</p>
      <p class="pc-pt"></p>
    </div>
  </div>
</div>

<div class="third">
  <div class="content">
    <div class="you">
      <div>
        <p class="human_img"></p>
      </div>
      <p>YOU</p>
    </div>
    <div class="vs">
      <p>VS</p>
    </div>
    <div class="pc">
      <div>
        <p class="pc_img"></p>
      </div>
      <p>CPU</p>
    </div>
  </div>
</div>

<div class="fourth">
  <p class="msg">
  </p>
</div>

<div class="fifth">
  <div class="content">
    <button class="rock">
      <p class="rock img">🪨</p>
      <p class="rock text">ROCK</p>
    </button>
    <button class="paper">
      <p class="paper img">📄</p>
      <p class="paper txt">PAPER</p>
    </button>
    <button class="scissors">
      <p class="scissors img">✂️</p>
      <p class="scissor txt">SCISSORS</p>
    </button>
  </div>
</div>

<div class="sixth">
  <button>RESET GAME</button>
</div>

<div class="overlay">
    <div class="end">
      <p class="dec"></p>
      <p class="dec-msg"></p>
      <button>Play Again</button>
  </div>
</div>




<script src="js.js"></script>
</body>

</html>
